# Nixpacks build config for RUSH — a static Vite/React SPA with no backend,
# no database, and no environment variables at build or runtime.
#
# Node version comes from .nvmrc (already in this repo) — Nixpacks reads it
# automatically, so it isn't pinned again here.

[phases.setup]
nixPkgs = ["nodejs_24", "pnpm"]

[phases.install]
cmds = ["corepack enable", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
